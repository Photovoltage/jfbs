<!DOCTYPE html>
<html>
<head>
  <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 12px; }
    .field { margin-bottom: 10px; }
    label { display: block; font-size: 12px; color: #555; margin-bottom: 3px; }
    input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    input:focus { outline: none; border-color: #09f; }
    button {
      width: 100%;
      padding: 9px;
      background: #0099ff;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { background: #007ecc; }
  </style>
</head>
<body>
  <div class="field">
    <label>Name</label>
    <input type="text" id="name" placeholder="John Smith">
  </div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="john@example.com">
  </div>
  <div class="field">
    <label>Phone</label>
    <input type="tel" id="phone" placeholder="+44 7700 900000">
  </div>
  <div class="field">
    <label>Company</label>
    <input type="text" id="company" placeholder="Acme Ltd">
  </div>
  
 <script>
    JFCustomWidget.subscribe("ready", function() {
      JFCustomWidget.requestFrameSize(210);
    });

    JFCustomWidget.subscribe("submit", function() {
      JFCustomWidget.sendSubmit({
        valid: true,
        value: document.getElementById("name").value || "No name entered",
        data: {
          name:    document.getElementById("name").value,
          email:   document.getElementById("email").value,
          phone:   document.getElementById("phone").value,
          company: document.getElementById("company").value
        }
      });
    });
  </script>
</body>
</html>
